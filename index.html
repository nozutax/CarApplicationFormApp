<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>継続検査申請書作成ツール</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 600px;
            width: 90%;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
        }
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .group-title {
            margin-top: 30px;
            margin-bottom: 10px;
            font-size: 16px;
            font-weight: bold;
            color: #444;
            text-align: left;
        }
        .group-title:first-child {
            margin-top: 0;
        }
        .btn {
            display: block;
            padding: 20px;
            text-decoration: none;
            color: white;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            transition: opacity 0.3s, transform 0.2s;
        }
        .btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
        /* 軽自動車用の色（青系） */
        .btn-kei {
            background-color: #007bff;
        }
        /* 普通車（専用3号）用の色（緑系） */
        .btn-senyo {
            background-color: #28a745;
        }
        /* 車庫証明図用の色（オレンジ系） */
        .btn-shako {
            background-color: #e67e22;
        }
        .icon {
            font-size: 24px;
            margin-right: 10px;
            vertical-align: middle;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>継続検査申請書 作成ポータル</h1>
    <p>作成したい様式を選択してください。</p>

    <div class="btn-container">
        <!-- 普通自動車 -->
        <div class="group-title">普通自動車</div>
        <a href="1gou/index.html" class="btn btn-senyo">
            <span class="icon">📄</span>第1号様式
            <div style="font-size: 0.8em; font-weight: normal; margin-top:5px;">自動車登録申請書（新規・移転・変更等）</div>
        </a>
        <a href="senyo3/index.html" class="btn btn-senyo">
            <span class="icon">🚗</span>専用 第3号様式
            <div style="font-size: 0.8em; font-weight: normal; margin-top:5px;">登録自動車の継続検査用</div>
        </a>

        <!-- 軽自動車 -->
        <div class="group-title">軽自動車</div>
        <a href="keisenn1/index.html" class="btn btn-kei">
            <span class="icon">📋</span>軽専用 第1号様式
            <div style="font-size: 0.8em; font-weight: normal; margin-top:5px;">自動車検査証記入申請書</div>
        </a>
        <a href="keisenn2/index.html" class="btn btn-kei">
            <span class="icon">🚙</span>軽専用 第2号様式
            <div style="font-size: 0.8em; font-weight: normal; margin-top:5px;">軽自動車の継続検査用</div>
        </a>

        <!-- 車庫証明 -->
        <div class="group-title">車庫証明</div>
        <a href="shako_houkoku/index.html" class="btn btn-shako">
            <span class="icon">📝</span>自動車保管場所現地調査結果報告書
        </a>
        <a href="shako_zu/index.html" class="btn btn-shako">
            <span class="icon">📐</span>車庫証明図
        </a>
    </div>
</div>

</body>
</html>
